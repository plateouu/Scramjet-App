<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Classes</title>
    <style>
        body { background: #e5e5e5; margin: 0; padding: 0; overflow: hidden; }
    </style>
    <script src="/api/v1/assets/assets.js"></script>
    <script src="/api/v1/assets/config.js"></script>
</head>
<body>
    <script>
        async function launch() {
            // Force clear old Scramjet service workers
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for(let reg of regs) {
                    console.log("Unregistering old SW:", reg.active?.scriptURL);
                    await reg.unregister();
                }
            }

            if (window.location.hash.length <= 1) return;

            try {
                const decoded = atob(window.location.hash.substring(1));
                const payload = JSON.parse(decoded);
                const url = payload.u;
                
                // Set Title/Icon based on payload (Decoy)
                if (payload.p) {
                    if (payload.p === "google-classroom") document.title = "Classes";
                    else if (payload.p === "desmos") document.title = "Desmos | Graphing Calculator";
                }

                // Register UV Service Worker
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('/api/v1/assets/worker.js', {
                        scope: __uv$config.prefix
                    });
                    
                    // Redirect to the proxied URL
                    window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
                }
            } catch (e) {
                console.error("Launcher failure:", e);
            }
        }
        launch();
    </script>
</body>
</html>
