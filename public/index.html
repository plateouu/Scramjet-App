<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Classes</title>
    <style>
        body { background: #000; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
        iframe { border: none; width: 100%; height: 100%; }
        .loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; font-family: system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
    <!-- Order matters: Library first, then Config -->
    <script src="baremux/index.js"></script>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script src="register-sw.js"></script>
</head>
<body>
    <div class="loading" id="loader">Initializing Secure Connection...</div>
    <iframe style="display: none" id="uv-frame" allow="fullscreen; camera; microphone; display-capture; clipboard-read; clipboard-write; autoplay"></iframe>

    <script>
        const loader = document.getElementById("loader");
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

        async function launch() {
            if (window.location.hash.length <= 1) {
                loader.textContent = "No payload found.";
                return;
            }

            try {
                // Decode payload
                const decoded = atob(window.location.hash.substring(1));
                const payload = JSON.parse(decoded);
                const url = payload.u;

                // Register Ultraviolet Service Worker
                await registerSW();

                // Connect to WISP transport (required by UV v3)
                let wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
                if ((await connection.getTransport()) !== "/epoxy/index.mjs") {
                    await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
                }

                // Launch the target url
                let frame = document.getElementById("uv-frame");
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                
                frame.onload = () => {
                    loader.style.display = "none";
                    frame.style.display = "block";
                };
            } catch (e) {
                console.error("Critical Launcher failure:", e);
                loader.textContent = "Initialization Failed";
                loader.style.background = "#ca4754"; // Red background on fail
            }
        }
        
        launch();
    </script>
</body>
</html>
