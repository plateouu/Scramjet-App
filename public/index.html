<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Classes</title>
    <style>
        body { background: #e5e5e5; margin: 0; padding: 0; overflow: hidden; }
    </style>
    <!-- Order matters: Library first, then Config -->
    <script src="/api/v1/assets/assets.js"></script>
    <script src="/api/v1/assets/config.js"></script>
</head>
<body>
    <script>
        async function launch() {
            // STEP 1: Nuclear purge of any old service workers (Scramjet/Zombie-UV)
            if ('serviceWorker' in navigator) {
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for(let reg of regs) {
                        console.log("Purging old service worker:", reg.active?.scriptURL);
                        await reg.unregister();
                    }
                } catch (e) {
                    console.warn("SW Clear failed, continuing anyway:", e);
                }
            }

            if (window.location.hash.length <= 1) {
                console.log("No payload found in hash.");
                return;
            }

            try {
                // STEP 2: Decode payload
                const decoded = atob(window.location.hash.substring(1));
                const payload = JSON.parse(decoded);
                const url = payload.u;
                
                // STEP 3: Decoy update
                if (payload.p === "google-classroom") document.title = "Classes";
                else if (payload.p === "desmos") document.title = "Desmos | Graphing Calculator";

                // STEP 4: Register Ultraviolet Service Worker
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('/api/v1/sw.js', {
                        scope: __uv$config.prefix
                    });
                    
                    // STEP 5: Launch
                    window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
                }
            } catch (e) {
                console.error("Critical Launcher failure:", e);
                document.body.style.background = "#ca4754"; // Red background on fail
            }
        }
        launch();
    </script>
</body>
</html>
